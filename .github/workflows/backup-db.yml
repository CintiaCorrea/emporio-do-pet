name: Backup do banco (pg_dump diário)

on:
  schedule:
    - cron: '0 7 * * *'   # ~04:00 horário de Brasília
  workflow_dispatch:        # roda manualmente pelo botao "Run workflow"

jobs:
  dump:
    runs-on: ubuntu-latest
    steps:
      - name: Conferir secret FLY_API_TOKEN
        id: check
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_BACKUP_TOKEN }}
        run: |
          if [ -z "$FLY_API_TOKEN" ]; then
            echo "::warning::Secret FLY_BACKUP_TOKEN nao configurado — backup pulado. Adicione em Settings > Secrets and variables > Actions."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Instalar flyctl
        if: steps.check.outputs.skip != 'true'
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Gerar dump via tunel do Fly
        if: steps.check.outputs.skip != 'true'
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_BACKUP_TOKEN }}
        run: |
          set -e
          echo "Descobrindo a string de conexao do banco..."
          DBURL=$(flyctl ssh console -a emporio-pet-api -C "printenv DATABASE_URL" 2>/dev/null | tr -d '\r' | grep -Eo 'postgres(ql)?://[^[:space:]]+' | head -1)
          if [ -z "$DBURL" ]; then echo "ERRO: nao obtive a DATABASE_URL"; exit 1; fi
          echo "Abrindo tunel para o Postgres interno (emporio-pet-db)..."
          flyctl proxy 15432:5432 -a emporio-pet-db &
          PROXY_PID=$!
          for i in $(seq 1 20); do (echo > /dev/tcp/127.0.0.1/15432) 2>/dev/null && { echo "tunel pronto"; break; }; sleep 2; done
          LOCALURL=$(echo "$DBURL" | sed -E 's#@[^/]+/#@127.0.0.1:15432/#')
          mkdir -p out
          ARQ="out/emporio-db-$(date +%Y-%m-%d-%H%M).sql.gz"
          docker run --rm --network host -e U="$LOCALURL" postgres:17 sh -c 'pg_dump --no-owner --no-privileges "$U"' | gzip > "$ARQ"
          kill $PROXY_PID 2>/dev/null || true
          echo "Gerado:"; ls -lh out

      - name: Guardar backup (artefato, 90 dias)
        if: steps.check.outputs.skip != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: emporio-db-backup-${{ github.run_number }}
          path: out/*.sql.gz
          retention-days: 90
