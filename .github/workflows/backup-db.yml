name: Backup do banco (pg_dump diário)

on:
  schedule:
    - cron: '0 7 * * *'   # ~04:00 horário de Brasília
  workflow_dispatch:

jobs:
  dump:
    runs-on: ubuntu-latest
    steps:
      - name: Conferir secret FLY_BACKUP_TOKEN
        id: check
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_BACKUP_TOKEN }}
        run: |
          if [ -z "$FLY_API_TOKEN" ]; then
            echo "::warning::Secret FLY_BACKUP_TOKEN nao configurado."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Instalar flyctl
        if: steps.check.outputs.skip != 'true'
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Gerar dump (pg_dumpall na maquina do banco)
        if: steps.check.outputs.skip != 'true'
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_BACKUP_TOKEN }}
        run: |
          set -o pipefail
          mkdir -p out
          ARQ="out/emporio-db-$(date +%Y-%m-%d-%H%M).sql.gz"
          # roda o pg_dumpall DENTRO da maquina do Postgres (acesso local) e traz o resultado por ssh
          flyctl ssh console -a emporio-pet-db -C 'sh -lc "PGPASSWORD=${OPERATOR_PASSWORD:-$SU_PASSWORD} pg_dumpall -h 127.0.0.1 -U postgres --no-role-passwords"' > dump.sql 2> err.log || true
          SIZE=$(stat -c%s dump.sql 2>/dev/null || echo 0)
          echo "Tamanho do dump: $SIZE bytes"
          if [ "$SIZE" -lt 1000 ]; then
            echo "=== FALHOU. Log do flyctl/ssh: ==="; cat err.log 2>/dev/null || true
            echo "=== Primeiros bytes do dump (debug): ==="; head -c 800 dump.sql 2>/dev/null || true
            exit 1
          fi
          gzip -c dump.sql > "$ARQ"
          echo "OK:"; ls -lh out

      - name: Guardar backup (artefato, 90 dias)
        if: steps.check.outputs.skip != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: emporio-db-backup-${{ github.run_number }}
          path: out/*.sql.gz
          retention-days: 90
