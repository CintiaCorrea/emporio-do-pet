# Fly.io config — Empório Pet Web (Next.js frontend)
# Deploy via GitHub Actions (.github/workflows/deploy-vet-crm.yml)
# Cintia: precisa gerar app primeiro via `fly apps create emporio-pet-web -o emporio-do-pet-administracao`

app = "emporio-do-web"
primary_region = "gru"

[build]
  dockerfile = "Dockerfile"

[env]
  NODE_ENV = "production"
  PORT = "3000"
  NEXT_TELEMETRY_DISABLED = "1"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

  [http_service.concurrency]
    type = "connections"
    hard_limit = 100
    soft_limit = 80

[[http_service.checks]]
  grace_period = "30s"
  interval = "30s"
  method = "GET"
  timeout = "10s"
  path = "/"

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
