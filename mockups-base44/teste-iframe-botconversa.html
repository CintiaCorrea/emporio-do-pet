<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Teste iframe BotConversa</title>
<style>
body{font-family:sans-serif;margin:0;padding:20px;background:#f5f5f5}
h1{font-size:18px}
.info{background:#fff;padding:12px;border-radius:8px;margin-bottom:16px;font-size:13px}
iframe{width:100%;height:600px;border:1px solid #ccc;border-radius:8px;background:white}
.ok{color:green}.err{color:red}
</style>
</head>
<body>
<h1>Teste de embed do BotConversa em iframe</h1>
<div class="info">
  Se o iframe abaixo aparecer com a tela de login/painel do BotConversa, é possível embedar.<br>
  Se aparecer vazio ou mensagem "refused to connect" → BotConversa bloqueia.
</div>
<iframe id="bc" src="https://app.botconversa.com.br/" onload="document.getElementById('result').innerText='✓ iframe carregou. Verifique se o conteúdo aparece visualmente.'" onerror="document.getElementById('result').innerText='✗ Erro de carregamento'"></iframe>
<div id="result" style="margin-top:12px;font-weight:600"></div>
<script>
  // Tentar acessar contentWindow (se for same-origin permite)
  setTimeout(() => {
    try {
      const doc = document.getElementById('bc').contentDocument;
      document.getElementById('result').innerText = doc ? '✓ Mesmo origem (consigo ler conteúdo)' : '✗ Cross-origin (não consigo ler — esperado)';
    } catch (e) {
      document.getElementById('result').innerText = '✗ Cross-origin: ' + e.message;
    }
  }, 4000);
</script>
</body>
</html>
