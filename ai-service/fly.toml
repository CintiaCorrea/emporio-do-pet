# =====================================================
# Fly.io Configuration - Empório do Pet AI Service
# =====================================================
# Deploy: fly deploy
# Logs: fly logs
# SSH: fly ssh console
#
# SECRETS OBRIGATÓRIOS (configurar via fly secrets set):
#   DATABASE_URL  - URL do Postgres (mesmo banco do backend)
#                   Ex: postgres://user:pass@app-db.flycast:5432/db
#                   Fly internal: fly secrets set DATABASE_URL="postgres://..."
# =====================================================

app = "emporio-pet-ai"
primary_region = "gru"  # São Paulo, Brasil

[build]
  dockerfile = "Dockerfile"

[env]
  ENVIRONMENT = "production"
  LOG_LEVEL = "INFO"
  CORS_ORIGINS = "https://emporiodopet.com.br,https://www.emporiodopet.com.br,https://emporio-pet-api.fly.dev"
  # DATABASE_URL é definido via fly secrets (não colocar aqui)

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

  [http_service.concurrency]
    type = "requests"
    hard_limit = 50
    soft_limit = 40

[[http_service.checks]]
  grace_period = "10s"
  interval = "30s"
  method = "GET"
  timeout = "5s"
  path = "/health"

# Machine configuration
[[vm]]
  memory = "1gb"
  cpu_kind = "shared"
  cpus = 1
