# =====================================================
# Fly.io Configuration - Empório do Pet Backend
# =====================================================
# Deploy: fly deploy
# Logs: fly logs
# SSH: fly ssh console
# =====================================================

app = "emporio-pet-api"
primary_region = "gru"  # São Paulo, Brasil

[build]
  dockerfile = "Dockerfile"

[env]
  NODE_ENV = "production"
  PORT = "8080"
  AI_SERVICE_URL = "http://emporio-pet-ai.internal:8080"
  FRONTEND_URL = "https://emporiodopet.com.br"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

  [http_service.concurrency]
    type = "connections"
    hard_limit = 100
    soft_limit = 80

[[http_service.checks]]
  grace_period = "30s"
  interval = "30s"
  method = "GET"
  timeout = "10s"
  path = "/api/health"

# Release command - sync schema + pgvector setup
# 1. prisma db push: cria/sincroniza tabelas (ignora campos Unsupported como embedding)
# 2. prisma db execute: aplica extensão pgvector, coluna embedding e índice HNSW
[deploy]
  release_command = "sh -c 'npx prisma db execute --file prisma/pgvector_extension.sql --schema prisma/schema.prisma && npx prisma db push --accept-data-loss && npx prisma db execute --file prisma/pgvector_setup.sql --schema prisma/schema.prisma'"

# Machine configuration
[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1

